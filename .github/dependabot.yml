version: 2
updates:
- package-ecosystem: "cargo" # See documentation for possible values
  directory: "/" # Location of package manifests
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 10 # Limit open Dependabot pull requests

- package-ecosystem: "gitsubmodule"
  directory: "/"
  schedule:
    interval: "weekly"
  # Limit open Dependabot pull requests for submodule updates
  open-pull-requests-limit: 10
